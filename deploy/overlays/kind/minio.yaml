apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: sqlites
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: sqlites
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data"]
          env:
            - name: MINIO_ROOT_USER
              value: sqlites
            - name: MINIO_ROOT_PASSWORD
              value: sqlites-secret
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: sqlites
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 sqlites sqlites-secret; do sleep 2; done
              mc mb --ignore-existing local/sqlites-replica
