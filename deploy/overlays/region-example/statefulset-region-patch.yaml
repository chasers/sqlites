apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smolsqls
  namespace: smolsqls
spec:
  template:
    spec:
      containers:
        - name: smolsqls
          env:
            # This node's own region. Its NodeRegistry upserts it into the
            # metadb `nodes` table on boot; region-aware placement constrains
            # a database's owner to a live node in its region.
            - name: REGION
              value: gcp-us-central1
            # Cross-cluster-routable node name — the GKE Multi-Cluster-Services
            # per-pod headless clusterset FQDN. Format:
            #   <pod>.<membership>.<service-export>.<namespace>.svc.clusterset.local
            # where <membership> is this cluster's fleet membership id
            # (smolsqls-<region>) and <service-export> is the exported governing
            # headless Service (smolsqls-headless). The membership segment makes each
            # pod's name unique across regions, so the shared smolsqls-headless export
            # is fine — no per-region Service needed. Omitting the <service-export>
            # segment yields NXDOMAIN. (The canonical form inserts a .global.
            # location segment after <membership>; this short form resolves for a
            # global membership.) $(POD_NAME) comes from the base StatefulSet env;
            # libcluster broadcasts this verbatim and every node Node.connect()s to
            # it, so it must resolve and route from every region.
            - name: RELEASE_NODE_HOST
              value: "$(POD_NAME).smolsqls-us-central1.smolsqls-headless.smolsqls.svc.clusterset.local"
            # Inter-node TLS across regions (see rel/env.sh.eex + runtime.exs).
            - name: DIST_TLS
              value: "true"
            - name: GEN_RPC_TLS
              value: "true"
