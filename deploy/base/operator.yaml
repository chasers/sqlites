---
spec:
  template:
    spec:
      containers:
        - env:
            - name: MIX_ENV
              value: prod
            - name: BONNY_OPERATOR_NAME
              value: sqlites-operator
            - name: BONNY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BONNY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BONNY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: BONNY_POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
          name: sqlites-operator
          image: sqlites-operator:dev
          resources:
            requests:
              cpu: 200m
              memory: 200Mi
            limits:
              cpu: 200m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
      serviceAccountName: sqlites-operator
    metadata:
      labels:
        k8s-app: sqlites-operator
  replicas: 1
  selector:
    matchLabels:
      k8s-app: sqlites-operator
metadata:
  name: sqlites-operator
  labels:
    k8s-app: sqlites-operator
  namespace: sqlites
kind: Deployment
apiVersion: apps/v1

---
spec:
  scope: Namespaced
  group: sqlites.supabase.com
  names:
    kind: SqliteNode
    plural: sqlitenodes
    singular: sqlitenode
    shortNames:
      - sqlnode
  versions:
    - name: v1alpha1
      deprecated: false
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              properties:
                databaseCount:
                  type: integer
                replicationSlot:
                  type: object
                  properties:
                    active:
                      type: boolean
                    name:
                      type: string
                    retainedBytes:
                      type: integer
                      format: int64
                    walStatus:
                      type: string
                  nullable: true
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                      type:
                        type: string
                      lastHeartbeatTime:
                        type: string
                        format: date-time
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
              nullable: true
              x-kubernetes-preserve-unknown-fields: true
            spec:
              type: object
              required:
                - ordinal
              properties:
                drain:
                  default: false
                  type: boolean
                  description: evacuate databases before decommission
                erlangNode:
                  type: string
                  nullable: true
                litestream:
                  type: object
                  properties:
                    bucket:
                      type: string
                    pathPrefix:
                      type: string
                  nullable: true
                ordinal:
                  type: integer
                  description: StatefulSet ordinal ↔ pod ↔ PVC
      additionalPrinterColumns:
        - name: Ordinal
          type: integer
          jsonPath: .spec.ordinal
        - name: Node
          type: string
          jsonPath: .spec.erlangNode
        - name: Databases
          type: integer
          jsonPath: .status.databaseCount
        - name: SlotStatus
          type: string
          jsonPath: .status.replicationSlot.walStatus
        - name: SlotActive
          type: boolean
          jsonPath: .status.replicationSlot.active
        - name: Draining
          type: boolean
          jsonPath: .spec.drain
      subresources:
        status: {}
      served: true
      deprecationWarning:
metadata:
  name: sqlitenodes.sqlites.supabase.com
  labels:
    k8s-app: sqlites-operator
kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1

---
metadata:
  name: sqlites-operator
  labels:
    k8s-app: sqlites-operator
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - '*'
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - '*'
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - '*'
  - apiGroups:
      - sqlites.supabase.com
    resources:
      - sqlitenodes
    verbs:
      - '*'
  - apiGroups:
      - sqlites.supabase.com
    resources:
      - sqlitenodes/status
    verbs:
      - '*'

---
metadata:
  name: sqlites-operator
  labels:
    k8s-app: sqlites-operator
  namespace: sqlites
kind: ServiceAccount
apiVersion: v1

---
metadata:
  name: sqlites-operator
  labels:
    k8s-app: sqlites-operator
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
roleRef:
  name: sqlites-operator
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
subjects:
  - name: sqlites-operator
    kind: ServiceAccount
    namespace: sqlites
