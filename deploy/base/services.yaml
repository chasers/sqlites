apiVersion: v1
kind: Service
metadata:
  name: sqlites-headless
  namespace: sqlites
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: sqlites
  ports:
    - name: epmd
      port: 4369
    - name: erl-dist
      port: 9100
    - name: gen-rpc
      port: 5369
    - name: gen-rpc-tls
      port: 5870
---
apiVersion: v1
kind: Service
metadata:
  name: sqlites
  namespace: sqlites
spec:
  selector:
    app: sqlites
  ports:
    - name: http
      port: 80
      targetPort: 4000
