apiVersion: v1
kind: ServiceAccount
metadata:
  name: smolsqls
  namespace: smolsqls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smolsqls-control-plane
  namespace: smolsqls
rules:
  - apiGroups: ["smolsqls.supabase.com"]
    resources: ["sqlitenodes", "sqlitenodes/status"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smolsqls-control-plane
  namespace: smolsqls
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smolsqls-control-plane
subjects:
  - kind: ServiceAccount
    name: smolsqls
    namespace: smolsqls
