apiVersion: v1
kind: ServiceAccount
metadata:
  name: sqlites
  namespace: sqlites
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sqlites-control-plane
  namespace: sqlites
rules:
  - apiGroups: ["sqlites.supabase.com"]
    resources: ["sqlitenodes", "sqlitenodes/status"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sqlites-control-plane
  namespace: sqlites
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sqlites-control-plane
subjects:
  - kind: ServiceAccount
    name: sqlites
    namespace: sqlites
